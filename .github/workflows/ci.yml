name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: stock-dashboard
      - name: Lint
        run: npm run lint
        working-directory: stock-dashboard
      - name: Build
        run: npm run build
        working-directory: stock-dashboard
      - name: Run tests
        run: npm test
        working-directory: stock-dashboard
